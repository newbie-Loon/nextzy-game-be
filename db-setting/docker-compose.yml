version: "3.9"

services:
  postgres:
    image: postgres:17
    container_name: nextzygame-postgres
    restart: always
    environment:
      POSTGRES_DB: nextzy_game
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: nextzygame_0660
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data: